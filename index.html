<!DOCTYPE html>
<html>
<head>
    <title>Welcome to servec</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        h1 { color: #2c3e50; }
        .info { background: #ecf0f1; padding: 15px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Welcome to servec!</h1>
    <div class="info">
        <p>This is a simple HTTP server written in C.</p>
        <p>Features:</p>
        <ul>
            <li>Configuration file support (~/.config/servec/config)</li>
            <li>Custom error pages (404, 500)</li>
            <li>MIME type detection</li>
            <li>Directory traversal protection</li>
        </ul>
    </div>
</body>
</html>
